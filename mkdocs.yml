site_name: Red Hat Enterprise Linux 10 — Beginner to RHCA
site_description: >
  A comprehensive, hands-on guide to RHEL 10 covering Linux fundamentals,
  system administration (RHCSA), automation (RHCE), and advanced
  infrastructure topics (RHCA — RHEL track).
site_author: RHEL Guide Contributors
docs_dir: docs
repo_url: ""

theme:
  name: material
  palette:
    scheme: slate
    primary: red
    accent: deep orange
  font:
    text: Red Hat Text
    code: Red Hat Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/redhat
      link: https://access.redhat.com/documentation/

nav:
  - Home: index.md

  - Preface:
      - About This Guide: 00-preface/about.md
      - Lab Workflow (Snapshots, Safety): 00-preface/labs.md
      - Conventions (Prompts, Paths, Editors): 00-preface/conventions.md

  - Getting Started (Onramp):
      - Install a RHEL 10 Lab VM: 01-getting-started/vm-install.md
      - First Boot Checklist: 01-getting-started/first-boot.md
      - Accounts, sudo, and Updates: 01-getting-started/sudo-updates.md
      - Getting Help (man, --help, apropos): 01-getting-started/help-system.md

  - Linux Foundations (Onramp):
      - Shell Basics (pwd, ls, cd): 02-foundations/shell-basics.md
      - Files and Text (cp, mv, rm, less): 02-foundations/files-and-text.md
      - Pipes and Redirection: 02-foundations/pipes-redirection.md
      - Editing Files (nano + vim intro): 02-foundations/editors.md
      - Users, Groups, Permissions: 02-foundations/permissions.md
      - ACLs (When and How): 02-foundations/acls.md
      - Lab - Shared Team Directory: 02-foundations/labs/shared-team-dir.md

  - RHEL Administration (RHCSA Track):
